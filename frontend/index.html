<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SSH Web Terminal</title>

    <style>
      body {
        margin: 0;
        font-family: Consolas, monospace;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .terminal {
        width: 800px;
        background: #161b22;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .terminal-header {
        background: #21262d;
        padding: 10px;
        display: flex;
      }

      .dot {
        height: 12px;
        width: 12px;
        border-radius: 50%;
        margin-right: 6px;
      }

      .red {
        background: #ff5f56;
      }
      .yellow {
        background: #ffbd2e;
      }
      .green {
        background: #27c93f;
      }

      .terminal-body {
        padding: 15px;
        flex: 1;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      .input-area {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      input,
      select {
        padding: 10px;
        background: #1e1e1e;
        color: white;
        border: none;
      }

      button {
        background: #238636;
        border: none;
        color: white;
        padding: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #2ea043;
      }

      #description {
        color: #aaa;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="terminal">
      <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>

      <div id="output" class="terminal-body">Welcome to SSH Web Terminal</div>

      <div class="input-area">
        <input id="ip" type="text" placeholder="Server IP" />

        <input id="user" type="text" placeholder="Username" />

        <input id="pass" type="password" placeholder="Password" />

        <select id="command" onchange="showDescription()">
          <option value="">-- Select Command --</option>

          <option value="uptime">uptime</option>

          <option value="df -h">df -h</option>

          <option value="free -m">free -m</option>

          <option value="whoami">whoami</option>
        </select>

        <div id="description">Select command to see description</div>

        <button onclick="runCommand()">Run</button>
      </div>
    </div>

    <script>
      function showDescription() {
        const cmd = document.getElementById("command").value;
        const desc = document.getElementById("description");

        if (cmd === "uptime")
          desc.innerText = "แสดงเวลาที่ server ทำงาน และ load average";
        else if (cmd === "df -h") desc.innerText = "แสดงพื้นที่ disk";
        else if (cmd === "free -m") desc.innerText = "แสดง RAM";
        else if (cmd === "whoami") desc.innerText = "แสดง user ปัจจุบัน";
        else desc.innerText = "Select command to see description";
      }

      async function runCommand() {
        const output = document.getElementById("output");

        const ip = document.getElementById("ip").value.trim();
        const user = document.getElementById("user").value.trim();
        const pass = document.getElementById("pass").value.trim();
        const cmd = document.getElementById("command").value.trim();

        if (!ip || !user || !pass || !cmd) {
          alert("กรอกข้อมูลให้ครบ");
          return;
        }

        output.innerHTML += "\n$ " + cmd + "\n";

        try {
          const response = await fetch(
            "http://localhost:8080/run.php" +
              "?ip=" +
              encodeURIComponent(ip) +
              "&user=" +
              encodeURIComponent(user) +
              "&pass=" +
              encodeURIComponent(pass) +
              "&cmd=" +
              encodeURIComponent(cmd),
          );

          const result = await response.text();

          output.innerHTML += result + "\n";

          output.scrollTop = output.scrollHeight;
        } catch (e) {
          output.innerHTML += "Error connecting backend\n";
        }
      }
    </script>
  </body>
</html>
